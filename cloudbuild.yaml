steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']
    
  # Build the frontend
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    
  # Build the backend
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build:server']

  # Deploy to App Engine
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['app', 'deploy', '--quiet']

timeout: '1200s'
options:
  machineType: 'E2_HIGHCPU_8'