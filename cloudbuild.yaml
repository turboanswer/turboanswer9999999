steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/turbo-answer:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/turbo-answer:latest'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/turbo-answer:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/turbo-answer:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/turbo-answer:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'turbo-answer'
      - '--image=gcr.io/$PROJECT_ID/turbo-answer:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=5000'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=50'
      - '--timeout=300'
      - '--concurrency=80'
      - '--set-env-vars=NODE_ENV=production'
      - '--update-secrets=DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,PAYPAL_CLIENT_ID=PAYPAL_CLIENT_ID:latest,PAYPAL_CLIENT_SECRET=PAYPAL_CLIENT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest,BREVO_API_KEY=BREVO_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/turbo-answer:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/turbo-answer:latest'

timeout: '1800s'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
