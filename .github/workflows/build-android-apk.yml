name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'shared/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle (Vite)
        run: npm run build

      - name: Sync Capacitor with Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build signed release AAB (for Play Store)
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Rename artifacts with commit SHA
        run: |
          mkdir -p dist-mobile
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp android/app/build/outputs/apk/release/app-release.apk \
             "dist-mobile/turbo-answer-${SHA}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab \
             "dist-mobile/turbo-answer-${SHA}.aab"
          ls -la dist-mobile/

      - name: Upload APK + AAB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbo-answer-android-${{ github.sha }}
          path: dist-mobile/
          retention-days: 30
