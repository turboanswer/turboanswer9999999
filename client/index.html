<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <title>Turbo Answer</title>
    <meta name="description" content="Turbo Answer - Advanced AI assistant powered by Google Gemini for technical programming, science, and universal knowledge questions" />
    <script type="text/javascript" src="//widget.trustpilot.com/bootstrap/v5/tp.widget.bootstrap.min.js" async></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5994279213894543" crossorigin="anonymous"></script>
    <style>
      /* Hide Google Translate's banner & frame so it doesn't push our layout.
         IMPORTANT: Do NOT use display:none on #google_translate_element — Google's
         widget refuses to attach to a hidden container. Instead the AutoTranslate
         component positions the mount target off-screen at runtime. */
      .goog-te-banner-frame.skiptranslate, .goog-tooltip, .goog-tooltip:hover { display: none !important; }
      body { top: 0 !important; }
      .goog-te-gadget { font-size: 0 !important; }
      .goog-te-gadget .goog-te-combo { display: none; }
      .VIpgJd-ZVi9od-l4eHX-hSRGPd, .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; }
      /* Stop Google Translate from injecting inline color/background that breaks our dark theme. */
      font[style*="background-color"] { background-color: transparent !important; box-shadow: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
